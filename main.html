<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container header-wrapper">
            <h1 class="logo">Coffee House</h1>

            <nav class="navbar">
                <a href="#home">Trang chủ</a>
                <a href="#about">Giới thiệu</a>
                <a href="#services">Thực đơn</a>
                <a href="#contact">Liên hệ</a>
            </nav>
        </div>
    </header>

    <!-- Banner -->
    <section id="home" class="hero">
        <div class="container hero-content">
            <span class="hero-label">Coffee & Relax</span>
            <h2>Không Gian Cà Phê Lý Tưởng</h2>
            <p>
                Thưởng thức những ly cà phê thơm ngon trong không gian
                hiện đại, yên tĩnh và đầy cảm hứng.
            </p>

            <a href="#services" class="btn-primary">
                Xem Thực Đơn
            </a>
        </div>
    </section>
<!-- Form liên hệ -->
<section id="contact" class="section">
    <div class="container">
        <h2 class="section-title">Liên Hệ Với Chúng Tôi</h2>

        <form class="contact-form">
            <input type="text" placeholder="Họ và tên" required>

            <input type="email" placeholder="Email" required>

            <textarea
                rows="5"
                placeholder="Nội dung liên hệ"
                required>
            </textarea>

            <button type="submit">
                Gửi liên hệ
            </button>
        </form>
    </div>
</section>

<!-- Footer -->
<footer class="site-footer">
    <p>© 2026 Coffee House - Nhóm 4</p>
</footer>
</body>
</html>
